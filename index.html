<!DOCTYPE html>
<html>
<head>
<title>A Question For You ❤️</title>
<style>
  .hearts::before{
  content:"❤️ ❤️ ❤️ ❤️ ❤️";
  position:absolute;
  top:0;
  left:0;
  font-size:30px;
  animation:float 6s linear infinite;
}

@keyframes float{
  0%{transform:translateY(100vh);}
  100%{transform:translateY(-100vh);}
}
body{
  text-align:center;
  font-family:Arial;
  background:linear-gradient(pink, lightblue);
}

h1{
  margin-top:100px;
}

button{
  padding:15px 30px;
  font-size:18px;
  margin:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.yes{
  background-color:#ff4da6;
  color:white;
}

.no{
  background-color:#ccc;
}
</style>
</head>

<body>

<h1>I Have Something To Ask You 💌</h1>
<p>You make me really happy.</p>
<p>Will you be my boyfriend?</p>

<button class="yes" onclick="yes()">YES ❤️</button>
<button class="no" onclick="moveNo()">No</button>

<script>
function yes(){
  alert("YAY!!! I'm so happy ❤️");
}

function moveNo(){
  alert("That button doesn't work 😜");
}
</script>

</body>
</html>
